<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EROT'X</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  video {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
</style>
</head>
<body>
<video id="v" autoplay muted playsinline>
  <source src="https://api.onedrive.com/v1.0/shares/u!aHR0cHM6Ly8xZHJ2Lm1zL3YvYy81ZmEzOTA2ZDdkYTNiOTgxL0lRREsteGJOYWpEb0ZScnpFczBnVEZ0NFdBZGNVWXFlZHNjUThHMkpHX3BLU0RpZz9lPTcwMExocg==/root/content" type="video/mp4">
</video>
<script>
  var v = document.getElementById('v');

  function playVideo() {
    v.currentTime = 0;
    var p = v.play();
    if (p !== undefined) {
      p.catch(function() { setTimeout(playVideo, 1000); });
    }
  }

  v.addEventListener('ended', function() { playVideo(); });
  v.addEventListener('pause', function() {
    setTimeout(function() { if (v.paused) playVideo(); }, 500);
  });
  v.addEventListener('stalled', function() { setTimeout(playVideo, 2000); });

  playVideo();

  setInterval(function() {
    if (v.paused || v.ended) playVideo();
  }, 5000);
</script>
</body>
</html>
