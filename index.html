<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EROT'X</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  video {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
</style>
</head>
<body>
<video id="v" autoplay loop muted playsinline>
  <source src="https://drive.google.com/uc?export=download&id=1rpGHGnGtD1_Zh7zMYEFIe0hczVEIJ5UH" type="video/mp4">
</video>
<script>
  var v = document.getElementById('v');
  v.play();
  // Sécurité : si la vidéo s'arrête, on la relance
  v.addEventListener('ended', function() { v.currentTime = 0; v.play(); });
  v.addEventListener('pause', function() { v.play(); });
</script>
</body>
</html>
